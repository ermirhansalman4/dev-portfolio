<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Geliştirici Portföy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-gradient"></div>

    <nav class="navbar glass">
        <div class="container nav-content">
            <a href="index.html" class="logo">Dev<span>Hub</span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="projects.html" class="active">Projeler</a></li>
                <!-- Dinamik linkler ui.js ile gelecek -->
            </ul>
        </div>
    </nav>

    <main class="container page-content">
        <section class="section">
            <div class="d-flex justify-between align-center mb-4">
                <h2 class="section-title">Tüm Projeler</h2>
                <div class="filter-group">
                    <select id="filter-type" class="form-control" style="width: auto;">
                        <option value="popular">En Popüler</option>
                        <option value="newest">En Yeni</option>
                    </select>
                </div>
            </div>
            <div id="projects-list" class="grid-container">
                <div class="loader">Yükleniyor...</div>
            </div>
        </section>
    </main>

    <footer class="footer glass">
        <div class="container">
            <p>&copy; <span id="year"></span> Geliştirici Portföy. Tüm hakları saklıdır.</p>
        </div>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
            }
        }
    </script>
    <script type="module" src="js/ui.js"></script>
    <script type="module">
        import { getDiscoveryProjects } from './js/projects.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('projects-list');
            const filterSelect = document.getElementById('filter-type');

            const loadProjects = async (filter) => {
                container.innerHTML = '<div class="loader">Yükleniyor...</div>';
                try {
                    const projects = await getDiscoveryProjects(filter);
                    container.innerHTML = '';
                    if(projects.length === 0) {
                        container.innerHTML = '<p>Henüz proje bulunmuyor.</p>';
                        return;
                    }
                    
                    projects.forEach(p => {
                        container.innerHTML += `
                            <div class="card glass hover-up">
                                <img src="${p.imageUrl || 'https://via.placeholder.com/400x250'}" alt="${p.title}" class="card-img">
                                <div class="card-body">
                                    <h3>${p.title}</h3>
                                    <p style="font-size: 0.85rem; color: var(--primary-color); margin-top: -5px; margin-bottom: 10px;">Yükleyen: <a href="profile.html?uid=${p.authorId}" style="color: var(--primary-color); font-weight: 600;">${p.authorName || 'Anonim'}</a></p>
                                    <p>${p.description.substring(0, 100)}...</p>
                                    <div class="tags">
                                        ${(p.technologies || []).map(t => `<span class="tag">${t}</span>`).join('')}
                                    </div>
                                    <div class="card-stats mt-2" style="font-size: 0.8rem; opacity: 0.7;">
                                        <span><i class="far fa-heart"></i> ${p.likesCount || 0}</span>
                                        <span class="ml-2"><i class="far fa-comment"></i> ${p.commentsCount || 0}</span>
                                    </div>
                                    <a href="project-detail.html?slug=${p.slug}" class="btn btn-outline btn-sm mt-3">Detaylar</a>
                                </div>
                            </div>
                        `;
                    });
                } catch (err) {
                    console.error(err);
                    container.innerHTML = '<p>Projeler yüklenemedi.</p>';
                }
            };

            filterSelect.addEventListener('change', (e) => loadProjects(e.target.value));
            loadProjects('popular');
        });
    </script>
</body>
</html>
